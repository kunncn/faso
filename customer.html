<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FASO - Order Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="./assets/imgs/faso-logo.ico" type="image/x-icon" />
    <style>
      body {
        font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      .item-row {
        animation: fadeIn 0.25s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .thankyou {
        animation: pop 0.35s ease;
      }
      @keyframes pop {
        0% {
          transform: scale(0.85);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body
    class="h-screen w-screen bg-gradient-to-br from-rose-50 to-yellow-50 flex flex-col overflow-hidden"
  >
    <!-- HEADER -->
    <div
      class="bg-rose-500 text-white p-6 flex items-center justify-center gap-3 shadow"
    >
      <span class="text-3xl">🥐</span>
      <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight">
        FASO PASTRY
      </h1>
    </div>

    <!-- WAITING SCREEN -->
    <div
      id="waiting-screen"
      class="flex-1 flex flex-col items-center justify-center text-center p-8"
    >
      <div class="text-6xl mb-4">👋</div>
      <h2 class="text-2xl md:text-3xl font-bold text-gray-700">Welcome!</h2>
      <p class="text-gray-400 mt-2 text-lg">Please order at the counter</p>
    </div>

    <!-- THANK YOU SCREEN -->
    <div
      id="thankyou-screen"
      class="hidden flex-1 flex-col items-center justify-center text-center p-8"
    >
      <div class="thankyou">
        <div class="text-6xl mb-4">✅</div>
        <h2 class="text-2xl md:text-3xl font-bold text-green-600">
          Thank You!
        </h2>
        <p class="text-gray-500 mt-2 text-lg">
          Total Paid:
          <span id="thankyou-total" class="font-bold text-rose-500"></span>
        </p>
      </div>
    </div>

    <!-- LIVE ORDER SCREEN -->
    <div
      id="order-screen"
      class="hidden flex-1 flex-col p-6 md:p-10 overflow-hidden"
    >
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl md:text-2xl font-bold text-gray-700">Your Order</h2>
        <span
          id="discount-badge"
          class="hidden bg-yellow-100 text-yellow-700 font-bold text-sm md:text-base px-3 py-1.5 rounded-full border border-yellow-300"
        ></span>
      </div>
      <div id="order-items" class="flex-1 overflow-y-auto space-y-3 pr-2"></div>
      <div class="border-t-2 border-rose-200 mt-4 pt-4 space-y-1">
        <div
          id="subtotal-row"
          class="hidden justify-between items-center text-gray-400"
        >
          <span class="text-sm">Subtotal</span>
          <span id="order-subtotal" class="text-sm"></span>
        </div>
        <div
          id="discount-row"
          class="hidden justify-between items-center text-yellow-600"
        >
          <span class="text-sm">Discount</span>
          <span id="order-discount-amt" class="text-sm font-bold"></span>
        </div>
        <div class="flex justify-between items-center pt-1">
          <span class="text-xl font-bold text-gray-500">TOTAL</span>
          <span
            id="order-total"
            class="text-3xl md:text-4xl font-extrabold text-rose-500"
            >RM0.00</span
          >
        </div>
      </div>
    </div>

    <script>
      const channel = new BroadcastChannel("faso-order");

      const waitingScreen = document.getElementById("waiting-screen");
      const thankyouScreen = document.getElementById("thankyou-screen");
      const orderScreen = document.getElementById("order-screen");

      function showScreen(name) {
        waitingScreen.classList.add("hidden");
        thankyouScreen.classList.add("hidden");
        thankyouScreen.classList.remove("flex");
        orderScreen.classList.add("hidden");
        orderScreen.classList.remove("flex");

        if (name === "waiting") {
          waitingScreen.classList.remove("hidden");
        } else if (name === "thankyou") {
          thankyouScreen.classList.remove("hidden");
          thankyouScreen.classList.add("flex");
        } else if (name === "order") {
          orderScreen.classList.remove("hidden");
          orderScreen.classList.add("flex");
        }
      }

      channel.onmessage = (event) => {
        const data = event.data;

        if (data.type === "update") {
          if (!data.items || data.items.length === 0) {
            showScreen("waiting");
            return;
          }

          showScreen("order");

          const itemsContainer = document.getElementById("order-items");
          itemsContainer.innerHTML = data.items
            .map((item) => {
              const tempIcon =
                item.temp === "hot" ? "🔥" : item.temp === "ice" ? "🧊" : "";
              const addonsText = item.addons.length
                ? `<div class="text-sm text-gray-400 pl-1">+ ${item.addons.join(", ")}</div>`
                : "";
              return `
                <div class="item-row bg-white rounded-2xl shadow-sm p-4 flex justify-between items-center">
                  <div>
                    <div class="font-bold text-lg text-gray-800">${tempIcon} ${item.name} <span class="text-rose-400">x${item.qty}</span></div>
                    ${addonsText}
                  </div>
                  <div class="text-lg font-bold text-gray-600">RM${item.lineTotal.toFixed(2)}</div>
                </div>
              `;
            })
            .join("");

          document.getElementById("order-total").innerText =
            `RM${data.total.toFixed(2)}`;

          const badge = document.getElementById("discount-badge");
          const subtotalRow = document.getElementById("subtotal-row");
          const discountRow = document.getElementById("discount-row");
          const discountRate = data.discountRate || 0;
          const discountAmt = data.discountAmt || 0;

          if (discountRate > 0 && discountAmt > 0) {
            badge.classList.remove("hidden");
            badge.innerText = `🏷️ ${(discountRate * 100).toFixed(0)}% OFF`;

            subtotalRow.classList.remove("hidden");
            subtotalRow.classList.add("flex");
            document.getElementById("order-subtotal").innerText =
              `RM${(data.total + discountAmt).toFixed(2)}`;

            discountRow.classList.remove("hidden");
            discountRow.classList.add("flex");
            document.getElementById("order-discount-amt").innerText =
              `-RM${discountAmt.toFixed(2)}`;
          } else {
            badge.classList.add("hidden");
            subtotalRow.classList.add("hidden");
            subtotalRow.classList.remove("flex");
            discountRow.classList.add("hidden");
            discountRow.classList.remove("flex");
          }
        }

        if (data.type === "complete") {
          document.getElementById("thankyou-total").innerText =
            `RM${data.total.toFixed(2)}`;
          showScreen("thankyou");
          setTimeout(() => showScreen("waiting"), 4000);
        }
      };

      // Default screen on load
      showScreen("waiting");
    </script>
  </body>
</html>
