<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FASO - Pastry POS System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="./assets/imgs/faso-logo.ico" type="image/x-icon" />
    <!-- <link
      rel="icon"
      type="image/png"
      href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAMwAAADACAMAAAB/Pny7AAAAzFBMVEUAhpf///8AfpCDu8QAg5QAgZPX5erb6O3T4+gAco..."
    /> -->
    <style>
      #cart-panel {
        transition: transform 0.3s ease;
      }
    </style>
  </head>

  <body class="h-screen flex flex-col overflow-hidden">
    <!-- NAV -->
    <nav
      class="bg-rose-500 text-white p-3 md:p-4 flex flex-col md:flex-row gap-2 justify-between items-center shadow-lg"
    >
      <div class="flex items-center gap-2">
        <i data-lucide="croissant" class="w-7 h-7 md:w-8 md:h-8"></i>
        <h1 class="text-lg md:text-2xl font-bold tracking-tighter">
          FASO <span class="font-light text-xs md:text-sm">PASTRY POS</span>
        </h1>
      </div>
      <div class="flex gap-2 items-center flex-wrap justify-center">
        <button
          onclick="exportPDF()"
          class="bg-black text-white px-3 py-1 md:px-4 md:py-2 rounded-lg text-sm md:text-base"
        >
          Export Bills
        </button>
        <button
          onclick="showOrderHistory()"
          class="bg-white text-rose-500 px-3 py-1 md:px-4 md:py-2 rounded-lg font-bold text-sm md:text-base"
        >
          History
        </button>
        <button
          onclick="resetDB()"
          class="bg-rose-800 text-white px-2 py-1 rounded text-xs opacity-20 hover:opacity-100"
        >
          ⚙
        </button>
        <button
          onclick="openInventoryManager()"
          class="bg-yellow-400 text-black px-3 py-1 md:px-4 md:py-2 rounded-lg font-bold text-sm md:text-base"
        >
          Inventory
        </button>
        <!-- MOBILE CART BUTTON -->
        <button
          onclick="toggleCart()"
          class="md:hidden bg-white text-rose-500 px-3 py-1 rounded-lg font-bold"
        >
          Cart
        </button>
      </div>
    </nav>

    <!-- MAIN -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
      <section
        id="pos-tab"
        class="flex-1 flex flex-col md:flex-row w-full overflow-hidden"
      >
        <!-- PRODUCTS -->
        <div class="flex-1 p-3 md:p-6 overflow-y-auto">
          <div
            class="flex flex-col md:flex-row gap-3 md:justify-between md:items-center mb-4"
          >
            <h2 class="text-lg md:text-xl font-semibold text-gray-800">
              Fresh Menu
            </h2>
            <input
              id="searchInput"
              type="text"
              placeholder="Search pastries..."
              class="border rounded-full px-3 py-2 w-full md:w-64"
            />
          </div>

          <!-- PRICE CATEGORIES -->
          <div class="grid grid-cols-4 md:grid-cols-8 gap-3 mb-4">
            <button
              onclick="filterByPrice(10)"
              class="bg-yellow-100 aspect-square flex items-center justify-center rounded-xl font-bold text-sm"
            >
              RM10
            </button>
            <button
              onclick="filterByPrice(12)"
              class="bg-yellow-100 aspect-square flex items-center justify-center rounded-xl font-bold text-sm"
            >
              RM12
            </button>
            <button
              onclick="filterByPrice(14)"
              class="bg-yellow-100 aspect-square flex items-center justify-center rounded-xl font-bold text-sm"
            >
              RM14
            </button>
            <button
              onclick="filterByPrice(15)"
              class="bg-yellow-100 aspect-square flex items-center justify-center rounded-xl font-bold text-sm"
            >
              RM15
            </button>
            <button
              onclick="filterByPrice(16)"
              class="bg-yellow-100 aspect-square flex items-center justify-center rounded-xl font-bold text-sm"
            >
              RM16
            </button>
            <button
              onclick="filterByPrice(18)"
              class="bg-yellow-100 aspect-square flex items-center justify-center rounded-xl font-bold text-sm"
            >
              RM18
            </button>
            <button
              onclick="filterByPrice(20)"
              class="bg-yellow-100 aspect-square flex items-center justify-center rounded-xl font-bold text-sm"
            >
              RM20
            </button>
            <button
              onclick="filterByPrice(30)"
              class="bg-yellow-100 aspect-square flex items-center justify-center rounded-xl font-bold text-sm"
            >
              RM30
            </button>
          </div>

          <!-- DRINK CATEGORIES -->
          <div
            class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-8 gap-3 mb-4"
          >
            <button
              onclick="filterDrink('coffee')"
              class="bg-blue-100 aspect-square flex items-center justify-center rounded-xl font-bold text-sm"
            >
              ☕ Coffee
            </button>
            <button
              onclick="filterDrink('tea')"
              class="bg-blue-100 aspect-square flex items-center justify-center rounded-xl font-bold text-sm"
            >
              🍵 Tea
            </button>
            <button
              onclick="filterDrink('soda')"
              class="bg-blue-100 aspect-square flex items-center justify-center rounded-xl font-bold text-sm"
            >
              🥤 Soda
            </button>
            <button
              onclick="filterDrink('matcha')"
              class="bg-blue-100 aspect-square flex items-center justify-center rounded-xl font-bold text-sm"
            >
              🍵 Matcha
            </button>
            <button
              onclick="filterDrink('chocolate')"
              class="bg-blue-100 aspect-square flex items-center justify-center rounded-xl font-bold text-sm"
            >
              🍫 Choco
            </button>
          </div>

          <div
            id="product-grid"
            class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-3 lg:grid-cols-4 gap-3"
          ></div>
        </div>

        <!-- CART -->
        <div
          id="cart-panel"
          class="fixed md:static inset-x-0 bottom-0 md:w-96 bg-white border-t md:border-l shadow-lg md:shadow-none flex flex-col transform translate-y-full md:translate-y-0 z-50 max-h-[85vh] md:max-h-none rounded-t-2xl md:rounded-none"
        >
          <div
            class="p-3 border-b bg-gray-50 flex items-center justify-between"
          >
            <div class="flex items-center gap-2 min-w-0">
              <i
                data-lucide="shopping-cart"
                class="w-5 h-5 text-rose-500 shrink-0"
              ></i>
              <h2 class="text-base md:text-lg font-bold truncate">
                Current Order
              </h2>
            </div>
            <button
              onclick="toggleCart()"
              class="md:hidden text-xs bg-black text-white px-2 py-1 rounded-lg shrink-0"
            >
              ✕
            </button>
          </div>
          <div
            id="cart-items"
            class="flex-1 overflow-y-auto p-3 space-y-3 min-h-0"
          ></div>
          <div class="p-4 border-t bg-gray-50 space-y-3">
            <div class="flex justify-between text-lg font-bold text-rose-600">
              <div class="space-y-2">
                <label class="text-xs text-gray-500">Order Type</label>
                <select
                  id="orderType"
                  onchange="setOrderType(this.value)"
                  class="w-full p-2 border rounded-lg"
                >
                  <option value="dinein">Dine In</option>
                  <option value="takeaway">Take Away</option>
                </select>
              </div>
              <div class="space-y-2">
                <label class="text-xs text-gray-500">Discount</label>
                <select
                  id="discount"
                  onchange="renderCart()"
                  class="w-full p-2 border rounded-lg"
                >
                  <option value="0">No Discount</option>
                  <option value="0.5">50% OFF</option>
                  <option value="0.2">20% OFF</option>
                  <option value="0.1">10% OFF</option>
                </select>
              </div>
              <span>Total</span>
              <span id="total">RM0.00</span>
            </div>
            <select id="paymentMethod" class="w-full p-2 border rounded-lg">
              <option value="cash">Cash</option>
              <option value="card">Credit Card</option>
              <option value="qr">QR Pay</option>
            </select>
            <button
              onclick="processSale()"
              class="w-full bg-green-500 hover:bg-green-600 text-white py-3 rounded-xl font-bold"
            >
              COMPLETE SALE
            </button>
          </div>
        </div>
      </section>
    </main>

    <!-- SUCCESS MODAL -->
    <div
      id="modal"
      class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4"
    >
      <div class="bg-white p-6 rounded-2xl text-center w-full max-w-sm">
        <h2 class="text-xl font-bold">Sale Successful!</h2>
        <p class="text-gray-500 mt-2">Receipt generated</p>
        <button
          onclick="closeModal()"
          class="mt-5 bg-gray-800 text-white px-6 py-2 rounded-lg"
        >
          Done
        </button>
      </div>
    </div>

    <!-- ORDER HISTORY -->
    <div
      id="history-modal"
      class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4"
    >
      <div class="bg-white w-full max-w-3xl rounded-2xl overflow-hidden">
        <div class="flex justify-between items-center p-4 border-b">
          <h2 class="font-bold text-lg">Today's Orders</h2>
          <button
            onclick="closeHistory()"
            class="bg-black text-white px-3 py-1 rounded-lg"
          >
            Close
          </button>
        </div>
        <div
          id="history-list"
          class="max-h-[70vh] overflow-y-auto p-4 space-y-3"
        ></div>
      </div>
    </div>

    <!-- DRINK ADD-ON MODAL -->
    <div
      id="addon-modal"
      class="hidden fixed inset-0 bg-black/50 flex items-end md:items-center justify-center z-50"
    >
      <div class="bg-white w-full md:max-w-md rounded-t-2xl md:rounded-2xl p-4">
        <div class="flex justify-between items-center mb-3">
          <h2 id="addon-title" class="font-bold text-lg">Customize Drink</h2>
          <button onclick="closeAddonModal()" class="text-gray-500">✕</button>
        </div>
        <div id="addon-list" class="space-y-2 max-h-64 overflow-y-auto"></div>
        <button
          onclick="confirmAddToCart()"
          class="w-full mt-4 bg-rose-500 text-white py-3 rounded-xl font-bold"
        >
          Add to Cart
        </button>
      </div>
    </div>

    <!-- ===================== -->
    <!-- INVENTORY MANAGER MODAL -->
    <!-- ===================== -->
    <div
      id="inventory-modal"
      class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-2 md:p-4"
    >
      <div
        class="bg-white w-full max-w-2xl rounded-2xl overflow-hidden flex flex-col max-h-[95vh]"
      >
        <!-- Header -->
        <div class="flex justify-between items-center p-4 border-b bg-gray-50">
          <h2 class="font-bold text-lg">Inventory Manager</h2>
          <div class="flex gap-2">
            <button
              onclick="openItemForm(null)"
              class="bg-rose-500 text-white px-3 py-1.5 rounded-lg text-sm font-bold flex items-center gap-1"
            >
              <i data-lucide="plus" class="w-4 h-4"></i> Add Item
            </button>
            <button
              onclick="closeInventoryManager()"
              class="bg-black text-white px-3 py-1.5 rounded-lg text-sm"
            >
              Close
            </button>
          </div>
        </div>

        <!-- Search -->
        <div class="p-3 border-b">
          <input
            id="inv-search"
            type="text"
            placeholder="Search items..."
            class="w-full border rounded-xl px-3 py-2 text-sm"
            oninput="
              inventorySearchTerm = this.value;
              renderInventoryList();
            "
          />
        </div>

        <!-- Item Form Panel (hidden by default) -->
        <div id="item-form-panel" class="hidden border-b bg-yellow-50 p-4">
          <h3 id="item-form-title" class="font-bold mb-3 text-gray-700">
            Add New Item
          </h3>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <!-- Name -->
            <div class="sm:col-span-2">
              <label class="text-xs text-gray-500 mb-1 block"
                >Item Name *</label
              >
              <input
                id="item-name"
                type="text"
                placeholder="e.g. Matcha Croissant"
                class="w-full border rounded-xl px-3 py-2 text-sm"
              />
            </div>

            <!-- Hot Price -->
            <div>
              <label class="text-xs text-gray-500 mb-1 block"
                >🔥 Hot Price (RM)</label
              >
              <input
                id="item-price"
                type="number"
                step="0.5"
                min="0"
                placeholder="0.00"
                class="w-full border rounded-xl px-3 py-2 text-sm"
              />
              <p class="text-[10px] text-gray-400 mt-1">
                Leave 0 if no hot option
              </p>
            </div>

            <!-- Ice Price -->
            <div>
              <label class="text-xs text-gray-500 mb-1 block"
                >🧊 Ice Price (RM)</label
              >
              <input
                id="item-price-ice"
                type="number"
                step="0.5"
                min="0"
                placeholder="0.00"
                class="w-full border rounded-xl px-3 py-2 text-sm"
              />
              <p class="text-[10px] text-gray-400 mt-1">
                Leave 0 if no ice option
              </p>
            </div>

            <!-- Category -->
            <div>
              <label class="text-xs text-gray-500 mb-1 block">Category *</label>
              <select
                id="item-category"
                class="w-full border rounded-xl px-3 py-2 text-sm"
              >
                <option value="pastry">🥐 Pastry</option>
                <option value="savory">🥪 Savory</option>
                <option value="coffee">☕ Coffee</option>
                <option value="tea">🍵 Tea</option>
                <option value="matcha">🍵 Matcha</option>
                <option value="soda">🥤 Soda</option>
                <option value="chocolate">🍫 Chocolate</option>
                <option value="addon">➕ Add-on</option>
              </select>
            </div>

            <!-- Sold Out -->
            <div class="flex items-center gap-3 pt-4">
              <input
                id="item-soldout"
                type="checkbox"
                class="w-4 h-4 accent-rose-500"
              />
              <label
                for="item-soldout"
                class="text-sm font-semibold text-gray-700"
                >Mark as Sold Out</label
              >
            </div>
          </div>

          <!-- Form Buttons -->
          <div class="flex gap-2 mt-4">
            <button
              onclick="saveItem()"
              class="flex-1 bg-green-500 text-white py-2 rounded-xl font-bold text-sm"
            >
              Save
            </button>
            <button
              onclick="closeItemForm()"
              class="flex-1 bg-gray-200 text-gray-700 py-2 rounded-xl font-bold text-sm"
            >
              Cancel
            </button>
          </div>
        </div>

        <!-- Item List -->
        <div
          id="inventory-list"
          class="flex-1 overflow-y-auto p-3 space-y-2"
        ></div>

        <!-- Footer count -->
        <div class="p-3 border-t bg-gray-50 text-xs text-gray-400 text-center">
          Total items: <strong>${inventory.length}</strong> — Changes apply to
          current session only
        </div>
      </div>
    </div>

    <!-- SCRIPT -->
    <script>
      function toggleCart() {
        const cart = document.getElementById("cart-panel");
        if (cart.classList.contains("translate-y-full")) {
          cart.classList.remove("translate-y-full");
        } else {
          cart.classList.add("translate-y-full");
        }
      }
    </script>

    <script src="app.js"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
